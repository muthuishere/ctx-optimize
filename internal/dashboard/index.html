<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ctx-optimize</title>
<style>
  :root {
    --bg0: #070b14; --bg1: #0c1322;
    --panel: #0e1526; --panel2: #121b30;
    --border: #1e2a45; --border2: #2b3a5e;
    --text: #e2e8f4; --dim: #7c89a6;
    --accent: #22d3ee; --accent2: #818cf8; --hot: #f471b5;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg0); color: var(--text); font: 13.5px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, var(--panel2), var(--panel)); flex-wrap: wrap; }
  header h1 { font-size: 16px; font-weight: 700; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: .5px; }
  header .sub { color: var(--dim); font-size: 11.5px; }
  select, input[type=text] { background: var(--bg1); color: var(--text); border: 1px solid var(--border2); border-radius: 8px; padding: 7px 11px; font: inherit; transition: border-color .15s, box-shadow .15s; }
  input[type=text] { flex: 1; min-width: 200px; }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(34,211,238,.15); }
  ::placeholder { color: var(--dim); }
  #counts { color: var(--dim); font-size: 12px; }
  #counts b { color: var(--accent); font-weight: 600; }
  main { flex: 1; display: flex; min-height: 0; }
  #side { width: 350px; border-right: 1px solid var(--border); background: var(--panel); display: flex; flex-direction: column; min-height: 0; }
  #results { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  #usagebox { border-bottom: 1px solid var(--border); padding: 10px 12px; font-size: 12px; line-height: 1.7; background: var(--bg1); }
  #stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--border); background: var(--bg1); }
  .stat { border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
  .stat b { display: block; font-size: 20px; letter-spacing: -.02em; }
  .stat.win b { color: var(--accent, #4ade80); }
  .stat span { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; }
  #servedchip { font-size: 11px; color: var(--dim); border: 1px solid var(--border); border-radius: 12px; padding: 2px 10px; white-space: nowrap; }
  #results:empty::before { content: "type a question above — same engine the agent uses"; color: var(--dim); font-size: 12px; padding: 8px; }
  .hit { padding: 9px 11px; border: 1px solid var(--border); border-left: 3px solid var(--kc, var(--accent2)); border-radius: 8px; cursor: pointer; background: var(--bg1); transition: transform .08s, border-color .15s, background .15s; }
  .hit:hover { border-color: var(--border2); background: var(--panel2); transform: translateX(2px); }
  .hit.sel { border-color: var(--accent); background: var(--panel2); box-shadow: 0 0 0 1px var(--accent) inset; }
  .hit .label { color: var(--text); font-weight: 600; }
  .hit .kind { display: inline-block; font-size: 10.5px; padding: 1px 7px; border-radius: 99px; margin-left: 6px; color: var(--bg0); background: var(--kc, var(--accent2)); font-weight: 700; vertical-align: 1px; }
  .hit .meta { color: var(--dim); font-size: 11.5px; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #detail { border-top: 1px solid var(--border); padding: 12px; max-height: 45%; overflow-y: auto; font-size: 12.5px; background: linear-gradient(180deg, var(--panel2), var(--panel)); }
  #detail h2 { font-size: 13.5px; color: var(--accent); margin-bottom: 8px; word-break: break-all; }
  #detail .row { margin: 3px 0; word-break: break-all; }
  #detail .k { color: var(--dim); }
  #detail .chip { display: inline-block; font-size: 10.5px; padding: 1px 8px; border-radius: 99px; color: var(--bg0); font-weight: 700; }
  #detail .nb { cursor: pointer; color: var(--accent2); }
  #detail .nb:hover { color: var(--accent); text-decoration: underline; }
  #stage { flex: 1; position: relative; min-width: 0; background: radial-gradient(1200px 800px at 65% 35%, var(--bg1) 0%, var(--bg0) 70%); }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: grab; }
  canvas.grabbing { cursor: grabbing; }
  canvas.point { cursor: pointer; }
  #legend { position: absolute; right: 12px; top: 12px; background: rgba(14,21,38,.92); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 12px; max-height: 45%; overflow-y: auto; backdrop-filter: blur(4px); }
  #legend div { display: flex; align-items: center; gap: 8px; padding: 1.5px 0; }
  #legend i { width: 11px; height: 11px; border-radius: 50%; display: inline-block; box-shadow: 0 0 6px currentColor; }
  #note { position: absolute; left: 12px; bottom: 10px; color: var(--dim); font-size: 11.5px; background: rgba(7,11,20,.7); padding: 3px 9px; border-radius: 6px; }
  #tip { position: absolute; pointer-events: none; display: none; background: rgba(14,21,38,.95); border: 1px solid var(--border2); border-radius: 8px; padding: 5px 10px; font-size: 12px; max-width: 380px; word-break: break-all; box-shadow: 0 4px 18px rgba(0,0,0,.5); }
  #empty { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; color: var(--dim); text-align: center; padding: 20px; }
  ::-webkit-scrollbar { width: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<header>
  <h1>ctx-optimize</h1>
  <span class="sub">answer from the store</span>
  <select id="module" title="module"></select>
  <input id="q" type="text" placeholder="ask the store… (Enter)" autocomplete="off">
  <span id="counts"></span>
  <span id="servedchip" title="click for the served panel" style="cursor:pointer"></span>
</header>
<main>
  <div id="side">
    <div id="stats"></div>
    <div id="usagebox" style="display:none"></div>
    <div id="results"></div>
    <div id="detail"><span class="k">click a node or a hit for details</span></div>
  </div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="legend"></div>
    <div id="note">drag: pan · wheel: zoom · click: inspect</div>
    <div id="tip"></div>
    <div id="empty"></div>
  </div>
</main>
<script>
"use strict";
const $ = id => document.getElementById(id);
const api = async (path) => {
  const r = await fetch(path);
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || r.statusText);
  return j;
};

// ---- state ----
let G = { nodes: [], edges: [] };     // full graph from the API
let V = { nodes: [], edges: [] };     // rendered subset (degree-capped)
let byId = new Map();
let selected = null, hovered = null;
let view = { x: 0, y: 0, k: 1 };      // pan/zoom transform
const MAX_RENDER = 1500;

// ---- colors: curated vivid palette, assigned per kind (sorted → stable) ----
const PALETTE = ['#38bdf8','#f472b6','#a3e635','#fbbf24','#a78bfa','#34d399',
                 '#fb7185','#22d3ee','#fb923c','#e879f9','#facc15','#4ade80',
                 '#93c5fd','#fda4af','#5eead4','#c4b5fd'];
let kindColors = new Map();
function assignColors() {
  kindColors = new Map();
  [...new Set(V.nodes.map(n => n.kind))].sort()
    .forEach((k, i) => kindColors.set(k, PALETTE[i % PALETTE.length]));
}
const kindColor = k => kindColors.get(k) || '#94a3b8';

// ---- served / usage analytics ----
async function loadUsage(key) {
  try {
    const u = await api('/api/usage?module=' + encodeURIComponent(key));
    const chip = $('servedchip');
    chip.textContent = u.total_served
      ? `served ${u.total_served} · saved ~${fmtTok(u.est_tokens_saved)} tok (~$${u.est_cost_saved_usd.toFixed(2)})`
      : 'served 0 — agents have not asked yet';
    $('stats').innerHTML = `
      <div class="stat"><b>${u.total_served}</b><span>answers served</span></div>
      <div class="stat"><b>${fmtTok(u.est_tokens_served)}</b><span>tokens delivered</span></div>
      <div class="stat win"><b>${fmtTok(u.est_tokens_saved)}</b><span>tokens saved (est)</span></div>
      <div class="stat win"><b>$${u.est_cost_saved_usd.toFixed(2)}</b><span>cost saved (est)</span></div>
      <div class="stat"><b>${u.served_today}</b><span>today</span></div>
      <div class="stat"><b>${u.served_last_7_days}</b><span>last 7 days</span></div>`;
    chip.onclick = () => {
      const box = $('usagebox');
      if (box.style.display !== 'none') { box.style.display = 'none'; return; }
      const verbs = Object.entries(u.by_verb || {}).sort((a,b)=>b[1].count-a[1].count)
        .map(([v,st]) => `<div class="row"><b>${esc(v)}</b> ×${st.count} · ${fmtTok(Math.round(st.bytes/4))} tok · avg ${st.avg_ms}ms</div>`).join('');
      const days = Object.entries(u.by_day || {}).sort().slice(-14)
        .map(([d,c]) => `<div class="row"><span class="k">${d}</span> ${'▪'.repeat(Math.min(c,40))} ${c}</div>`).join('');
      box.innerHTML = `<div class="row"><b>served</b> — ${u.total_served} answers · ~${fmtTok(u.est_tokens_served)} tok delivered · <b>~${fmtTok(u.est_tokens_saved)} tok saved (~$${u.est_cost_saved_usd.toFixed(2)})</b>${u.first_event?` · since ${u.first_event}`:''}</div>
        <div class="row k" style="font-size:10px">${esc(u.saved_model||'')}</div>
        <div class="row"><span class="k">today ${u.served_today} · last 7 days ${u.served_last_7_days}</span></div>${verbs}
        <div class="row k">last 14 days</div>${days}
        <div class="row k" style="margin-top:6px">data: ${esc(u.file||'')} · <a href="/api/usage?module=${encodeURIComponent(key)}&format=csv" style="color:var(--accent2,#93c5fd)">download csv</a></div>`;
      box.style.display = 'block';
    };
  } catch (e) { /* analytics must never break the dashboard */ }
}
const fmtTok = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'k' : String(n);

// ---- modules ----
// Multi-module repos nest stores under one root ("beam/sdks/java/harness"):
// group the picker per repo, label nested entries by their in-repo path, and
// surface the navigator's one-line summary as the option tooltip.
async function loadModules() {
  const mods = await api('/api/modules');
  const sel = $('module');
  sel.innerHTML = '';
  const byRoot = new Map();
  for (const m of mods) {
    if (!byRoot.has(m.root)) byRoot.set(m.root, []);
    byRoot.get(m.root).push(m);
  }
  for (const [root, list] of byRoot) {
    if (list.length === 1 && list[0].key === root) {
      const m = list[0];
      const o = document.createElement('option');
      o.value = m.key; o.textContent = `${m.key} (${m.nodes})`;
      if (m.summary) o.title = m.summary;
      sel.appendChild(o);
      continue;
    }
    const g = document.createElement('optgroup');
    g.label = `${root} — ${list.length} modules`;
    for (const m of list) {
      const o = document.createElement('option');
      const label = m.key === root ? '(repo root)' : m.key.slice(root.length + 1);
      o.value = m.key; o.textContent = `${label} (${m.nodes})`;
      if (m.summary) o.title = m.summary;
      g.appendChild(o);
    }
    sel.appendChild(g);
  }
  const want = new URLSearchParams(location.search).get('module');
  if (want && mods.some(m => m.key === want)) sel.value = want;
  if (mods.length === 0) {
    $('empty').style.display = 'flex';
    $('empty').textContent = 'no modules in the store yet — run `ctx-optimize add` in a repo first';
    return;
  }
  await loadGraph(sel.value);
}

async function loadGraph(key) {
  G = await api('/api/graph?module=' + encodeURIComponent(key));
  G.nodes = G.nodes || []; G.edges = G.edges || [];
  $('counts').innerHTML = `<b>${G.nodes.length}</b> nodes · <b>${G.edges.length}</b> edges`;
  loadUsage(key);
  history.replaceState(null, '', '?module=' + encodeURIComponent(key));
  buildView();
  assignColors();
  legend();
  layout();
}

// Degree-cap what we draw; the query API still sees everything.
function buildView() {
  const deg = new Map();
  for (const e of G.edges) {
    deg.set(e.source, (deg.get(e.source) || 0) + 1);
    deg.set(e.target, (deg.get(e.target) || 0) + 1);
  }
  let nodes = G.nodes;
  if (nodes.length > MAX_RENDER) {
    nodes = [...G.nodes].sort((a, b) => (deg.get(b.id) || 0) - (deg.get(a.id) || 0)).slice(0, MAX_RENDER);
    $('note').textContent = `showing top ${MAX_RENDER} of ${G.nodes.length} nodes by degree · drag/wheel/click`;
  }
  const keep = new Set(nodes.map(n => n.id));
  V.nodes = nodes.map(n => ({ ...n, x: 0, y: 0, vx: 0, vy: 0, deg: deg.get(n.id) || 0 }));
  V.edges = G.edges.filter(e => keep.has(e.source) && keep.has(e.target));
  byId = new Map(V.nodes.map(n => [n.id, n]));
  selected = null; hovered = null;
  renderDetail(null);
}

function legend() {
  $('legend').innerHTML = [...kindColors.entries()]
    .map(([k, c]) => `<div><i style="background:${c};color:${c}"></i>${k}</div>`).join('');
}

// ---- force layout (simple, self-contained) ----
let ticking = 0;
function layout() {
  const R = Math.sqrt(V.nodes.length) * 60 + 60;
  V.nodes.forEach((n, i) => {
    const a = (i / V.nodes.length) * Math.PI * 2;
    const r = R * (0.3 + 0.7 * ((i * 2654435761 % 997) / 997));
    n.x = Math.cos(a) * r; n.y = Math.sin(a) * r;
  });
  fitView(R);
  ticking = 300;
  requestAnimationFrame(tick);
}

function tick() {
  if (ticking-- <= 0) { draw(); return; }
  const nodes = V.nodes, k = 45;
  // repulsion on a spatial grid (cheap approximation)
  const cell = 90, grid = new Map();
  for (const n of nodes) {
    const gk = (Math.round(n.x / cell)) + ':' + (Math.round(n.y / cell));
    (grid.get(gk) || grid.set(gk, []).get(gk)).push(n);
  }
  for (const n of nodes) {
    const gx = Math.round(n.x / cell), gy = Math.round(n.y / cell);
    for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++) {
      const bucket = grid.get((gx + dx) + ':' + (gy + dy));
      if (!bucket) continue;
      for (const m of bucket) {
        if (m === n) continue;
        let ddx = n.x - m.x, ddy = n.y - m.y;
        let d2 = ddx * ddx + ddy * ddy || 1;
        if (d2 > cell * cell * 4) continue;
        const f = (k * k) / d2 * 0.6;
        n.vx += ddx * f * 0.01; n.vy += ddy * f * 0.01;
      }
    }
  }
  // springs
  for (const e of V.edges) {
    const a = byId.get(e.source), b = byId.get(e.target);
    if (!a || !b) continue;
    const dx = b.x - a.x, dy = b.y - a.y;
    const d = Math.sqrt(dx * dx + dy * dy) || 1;
    const f = (d - 70) * 0.004;
    a.vx += dx / d * f * 10; a.vy += dy / d * f * 10;
    b.vx -= dx / d * f * 10; b.vy -= dy / d * f * 10;
  }
  // mild centering + integrate
  for (const n of nodes) {
    n.vx -= n.x * 0.0009; n.vy -= n.y * 0.0009;
    n.x += Math.max(-8, Math.min(8, n.vx)); n.y += Math.max(-8, Math.min(8, n.vy));
    n.vx *= 0.85; n.vy *= 0.85;
  }
  draw();
  requestAnimationFrame(tick);
}

// ---- rendering ----
const cv = $('cv'), ctx = cv.getContext('2d');
function resize() {
  const r = cv.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio; cv.height = r.height * devicePixelRatio;
  draw();
}
window.addEventListener('resize', resize);

function fitView(R) {
  const r = cv.getBoundingClientRect();
  view.k = Math.min(r.width, r.height) / (R * 2.4) || 1;
  view.x = r.width / 2; view.y = r.height / 2;
}

function draw() {
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.translate(view.x, view.y); ctx.scale(view.k, view.k);
  const focus = selected || hovered;
  const neigh = neighborSet(focus);
  const glow = V.nodes.length <= 600; // shadows are pricey on huge graphs

  // edges under nodes
  for (const e of V.edges) {
    const a = byId.get(e.source), b = byId.get(e.target);
    if (!a || !b) continue;
    const hot = focus && (e.source === focus.id || e.target === focus.id);
    ctx.strokeStyle = hot ? 'rgba(34,211,238,.9)' : (focus ? 'rgba(124,137,166,.07)' : 'rgba(124,137,166,.22)');
    ctx.lineWidth = (hot ? 1.8 : 1) / view.k;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }

  for (const n of V.nodes) {
    const r = 3.5 + Math.min(10, Math.sqrt(n.deg) * 1.4);
    const inFocus = !focus || n === focus || neigh.has(n.id);
    const c = kindColor(n.kind);
    ctx.globalAlpha = inFocus ? 1 : 0.28;
    if (glow && inFocus) { ctx.shadowColor = c; ctx.shadowBlur = 12; } else { ctx.shadowBlur = 0; }
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    // crisp core + ring for the focused node
    if (n === focus) {
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.6 / view.k;
      ctx.beginPath(); ctx.arc(n.x, n.y, r + 3 / view.k, 0, Math.PI * 2); ctx.stroke();
    }
    if (view.k > 0.5 && (n === focus || neigh.has(n.id) || (!focus && n.deg > 3))) {
      ctx.font = `${11 / view.k}px ui-monospace, monospace`;
      ctx.lineWidth = 3 / view.k; ctx.strokeStyle = 'rgba(7,11,20,.85)';
      ctx.strokeText(n.label, n.x + r + 4 / view.k, n.y + 3.5 / view.k);
      ctx.fillStyle = n === focus ? '#ffffff' : 'rgba(226,232,244,.92)';
      ctx.fillText(n.label, n.x + r + 4 / view.k, n.y + 3.5 / view.k);
    }
    ctx.globalAlpha = 1;
  }
}

function neighborSet(sel) {
  const s = new Set();
  if (!sel) return s;
  for (const e of V.edges) {
    if (e.source === sel.id) s.add(e.target);
    if (e.target === sel.id) s.add(e.source);
  }
  return s;
}

// ---- interaction ----
let drag = null;
function nodeAt(e) {
  const r = cv.getBoundingClientRect();
  const wx = (e.clientX - r.left - view.x) / view.k, wy = (e.clientY - r.top - view.y) / view.k;
  let best = null, bd = 12 / view.k + 6;
  for (const n of V.nodes) {
    const d = Math.hypot(n.x - wx, n.y - wy);
    if (d < bd) { bd = d; best = n; }
  }
  return best;
}
cv.addEventListener('mousedown', e => { drag = { x: e.clientX, y: e.clientY, moved: false }; cv.classList.add('grabbing'); });
window.addEventListener('mousemove', e => {
  if (drag) {
    view.x += e.clientX - drag.x; view.y += e.clientY - drag.y;
    drag.x = e.clientX; drag.y = e.clientY; drag.moved = true;
    draw();
    return;
  }
  const n = nodeAt(e);
  cv.classList.toggle('point', !!n);
  const tip = $('tip');
  if (n && n !== selected) {
    hovered = n;
    tip.style.display = 'block';
    const r = $('stage').getBoundingClientRect();
    tip.style.left = Math.min(e.clientX - r.left + 14, r.width - 300) + 'px';
    tip.style.top = (e.clientY - r.top + 14) + 'px';
    tip.innerHTML = '';
    const b = document.createElement('b'); b.textContent = n.label;
    tip.appendChild(b);
    tip.appendChild(document.createElement('br'));
    const s = document.createElement('span'); s.style.color = 'var(--dim)';
    s.textContent = `${n.kind} · ${n.source}`;
    tip.appendChild(s);
    draw();
  } else if (hovered) {
    hovered = null; tip.style.display = 'none'; draw();
  } else {
    tip.style.display = 'none';
  }
});
window.addEventListener('mouseup', e => {
  cv.classList.remove('grabbing');
  if (drag && !drag.moved) select(nodeAt(e));
  drag = null;
});
cv.addEventListener('mouseleave', () => { hovered = null; $('tip').style.display = 'none'; draw(); });
cv.addEventListener('wheel', e => {
  e.preventDefault();
  const r = cv.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const f = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  view.x = mx - (mx - view.x) * f; view.y = my - (my - view.y) * f; view.k *= f;
  draw();
}, { passive: false });

function select(n) {
  selected = n; hovered = null; $('tip').style.display = 'none';
  renderDetail(n);
  draw();
}

function centerOn(n) {
  const r = cv.getBoundingClientRect();
  view.k = Math.max(view.k, 1);
  view.x = r.width / 2 - n.x * view.k; view.y = r.height / 2 - n.y * view.k;
  draw();
}

function renderDetail(n) {
  const d = $('detail');
  if (!n) { d.innerHTML = '<span class="k">click a node or a hit for details</span>'; return; }
  const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const nbs = [];
  for (const e of V.edges) {
    if (e.source === n.id) nbs.push({ dir: '→', rel: e.relation, id: e.target });
    if (e.target === n.id) nbs.push({ dir: '←', rel: e.relation, id: e.source });
  }
  d.innerHTML = `<h2>${esc(n.label)}</h2>
    <div class="row"><span class="chip" style="background:${kindColor(n.kind)}">${esc(n.kind)}</span> <span class="k">type</span> ${esc(n.file_type)}</div>
    <div class="row"><span class="k">source</span> ${esc(n.source)} ${esc(n.location || '')}</div>
    <div class="row"><span class="k">producer</span> ${esc(n.metadata && n.metadata.producer || '')}</div>
    ${nbs.slice(0, 30).map(x => `<div class="row">${x.dir} <span class="k">${esc(x.rel)}</span> <span class="nb" data-id="${esc(x.id)}">${esc(x.id)}</span></div>`).join('')}
    ${nbs.length > 30 ? `<div class="row k">… ${nbs.length - 30} more</div>` : ''}`;
  d.querySelectorAll('.nb').forEach(el => el.addEventListener('click', () => {
    const t = byId.get(el.dataset.id);
    if (t) { select(t); centerOn(t); }
  }));
}

// ---- query ----
async function runQuery() {
  const q = $('q').value.trim();
  const res = $('results');
  if (!q) { res.innerHTML = ''; return; }
  try {
    const out = await api(`/api/query?module=${encodeURIComponent($('module').value)}&q=${encodeURIComponent(q)}`);
    const hits = out.hits || [];
    res.innerHTML = hits.length ? '' : '<div class="hit"><span class="meta">no matches</span></div>';
    for (const h of hits) {
      const div = document.createElement('div');
      div.className = 'hit';
      div.style.setProperty('--kc', kindColor(h.node.kind));
      div.innerHTML = `<div><span class="label"></span><span class="kind"></span></div><div class="meta"></div>`;
      div.querySelector('.label').textContent = h.node.label;
      div.querySelector('.kind').textContent = h.node.kind;
      div.querySelector('.meta').textContent = `${h.node.source} ${h.node.location || ''} · score ${h.score}`;
      div.addEventListener('click', () => {
        document.querySelectorAll('.hit.sel').forEach(x => x.classList.remove('sel'));
        div.classList.add('sel');
        const n = byId.get(h.node.id);
        if (n) { select(n); centerOn(n); } else { renderDetail(h.node); }
      });
      res.appendChild(div);
    }
  } catch (err) {
    res.innerHTML = `<div class="hit"><span class="meta">${err.message}</span></div>`;
  }
}

$('q').addEventListener('keydown', e => { if (e.key === 'Enter') runQuery(); });
$('module').addEventListener('change', e => { $('results').innerHTML = ''; loadGraph(e.target.value); });

resize();
loadModules().catch(err => {
  $('empty').style.display = 'flex';
  $('empty').textContent = err.message;
});
</script>
</body>
