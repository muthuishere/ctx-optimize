<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ctx-optimize</title>
<style>
  :root {
    --bg: #0f1115; --panel: #161a22; --border: #262c38; --text: #d7dce5;
    --dim: #8b93a3; --accent: #5eead4; --accent2: #7aa2f7;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--panel); flex-wrap: wrap; }
  header h1 { font-size: 15px; color: var(--accent); font-weight: 600; }
  header .sub { color: var(--dim); font-size: 12px; }
  select, input[type=text] { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px; font: inherit; }
  input[type=text] { flex: 1; min-width: 180px; }
  input:focus, select:focus { outline: 1px solid var(--accent2); }
  main { flex: 1; display: flex; min-height: 0; }
  #side { width: 340px; border-right: 1px solid var(--border); background: var(--panel); display: flex; flex-direction: column; min-height: 0; }
  #results { flex: 1; overflow-y: auto; padding: 8px; }
  .hit { padding: 8px 10px; border: 1px solid transparent; border-radius: 6px; cursor: pointer; }
  .hit:hover, .hit.sel { border-color: var(--border); background: var(--bg); }
  .hit .label { color: var(--accent2); }
  .hit .meta { color: var(--dim); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #detail { border-top: 1px solid var(--border); padding: 10px; max-height: 45%; overflow-y: auto; font-size: 12.5px; }
  #detail h2 { font-size: 13px; color: var(--accent); margin-bottom: 6px; word-break: break-all; }
  #detail .row { margin: 2px 0; word-break: break-all; }
  #detail .k { color: var(--dim); }
  #detail .nb { cursor: pointer; color: var(--accent2); }
  #detail .nb:hover { text-decoration: underline; }
  #stage { flex: 1; position: relative; min-width: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #legend { position: absolute; right: 10px; top: 10px; background: color-mix(in srgb, var(--panel) 88%, transparent); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 12px; max-height: 40%; overflow-y: auto; }
  #legend div { display: flex; align-items: center; gap: 6px; }
  #legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  #note { position: absolute; left: 10px; bottom: 10px; color: var(--dim); font-size: 12px; }
  #empty { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; color: var(--dim); text-align: center; padding: 20px; }
</style>
</head>
<body>
<header>
  <h1>ctx-optimize</h1>
  <span class="sub">answer from the store</span>
  <select id="module" title="module"></select>
  <input id="q" type="text" placeholder="ask the store… (Enter)" autocomplete="off">
  <span class="sub" id="counts"></span>
</header>
<main>
  <div id="side">
    <div id="results"></div>
    <div id="detail"><span class="k">click a node or a hit for details</span></div>
  </div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="legend"></div>
    <div id="note">drag: pan · wheel: zoom · click: inspect</div>
    <div id="empty"></div>
  </div>
</main>
<script>
"use strict";
const $ = id => document.getElementById(id);
const api = async (path) => {
  const r = await fetch(path);
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || r.statusText);
  return j;
};

// ---- state ----
let G = { nodes: [], edges: [] };     // full graph from the API
let V = { nodes: [], edges: [] };     // rendered subset (degree-capped)
let byId = new Map();
let selected = null;
let view = { x: 0, y: 0, k: 1 };      // pan/zoom transform
const MAX_RENDER = 1500;

// ---- colors: stable hue per kind ----
const kindHue = k => { let h = 0; for (const c of k) h = (h * 31 + c.charCodeAt(0)) % 360; return h; };
const kindColor = k => `hsl(${kindHue(k)} 65% 62%)`;

// ---- modules ----
async function loadModules() {
  const mods = await api('/api/modules');
  const sel = $('module');
  sel.innerHTML = '';
  for (const m of mods) {
    const o = document.createElement('option');
    o.value = m.key; o.textContent = `${m.key} (${m.nodes})`;
    sel.appendChild(o);
  }
  const want = new URLSearchParams(location.search).get('module');
  if (want && mods.some(m => m.key === want)) sel.value = want;
  if (mods.length === 0) {
    $('empty').style.display = 'flex';
    $('empty').textContent = 'no modules in the store yet — run `ctx-optimize add` in a repo first';
    return;
  }
  await loadGraph(sel.value);
}

async function loadGraph(key) {
  G = await api('/api/graph?module=' + encodeURIComponent(key));
  G.nodes = G.nodes || []; G.edges = G.edges || [];
  $('counts').textContent = `${G.nodes.length} nodes · ${G.edges.length} edges`;
  history.replaceState(null, '', '?module=' + encodeURIComponent(key));
  buildView();
  legend();
  layout();
}

// Degree-cap what we draw; the query API still sees everything.
function buildView() {
  const deg = new Map();
  for (const e of G.edges) {
    deg.set(e.source, (deg.get(e.source) || 0) + 1);
    deg.set(e.target, (deg.get(e.target) || 0) + 1);
  }
  let nodes = G.nodes;
  if (nodes.length > MAX_RENDER) {
    nodes = [...G.nodes].sort((a, b) => (deg.get(b.id) || 0) - (deg.get(a.id) || 0)).slice(0, MAX_RENDER);
    $('note').textContent = `showing top ${MAX_RENDER} of ${G.nodes.length} nodes by degree · drag/wheel/click`;
  }
  const keep = new Set(nodes.map(n => n.id));
  V.nodes = nodes.map(n => ({ ...n, x: 0, y: 0, vx: 0, vy: 0, deg: deg.get(n.id) || 0 }));
  V.edges = G.edges.filter(e => keep.has(e.source) && keep.has(e.target));
  byId = new Map(V.nodes.map(n => [n.id, n]));
  selected = null;
  renderDetail(null);
}

function legend() {
  const kinds = [...new Set(V.nodes.map(n => n.kind))].sort();
  $('legend').innerHTML = kinds.map(k => `<div><i style="background:${kindColor(k)}"></i>${k}</div>`).join('');
}

// ---- force layout (simple, self-contained) ----
let ticking = 0;
function layout() {
  const R = Math.sqrt(V.nodes.length) * 60 + 60;
  V.nodes.forEach((n, i) => {
    const a = (i / V.nodes.length) * Math.PI * 2;
    const r = R * (0.3 + 0.7 * ((i * 2654435761 % 997) / 997));
    n.x = Math.cos(a) * r; n.y = Math.sin(a) * r;
  });
  fitView(R);
  ticking = 300;
  requestAnimationFrame(tick);
}

function tick() {
  if (ticking-- <= 0) { draw(); return; }
  const nodes = V.nodes, k = 45;
  // repulsion on a spatial grid (cheap approximation)
  const cell = 90, grid = new Map();
  for (const n of nodes) {
    const gk = (Math.round(n.x / cell)) + ':' + (Math.round(n.y / cell));
    (grid.get(gk) || grid.set(gk, []).get(gk)).push(n);
  }
  for (const n of nodes) {
    const gx = Math.round(n.x / cell), gy = Math.round(n.y / cell);
    for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++) {
      const bucket = grid.get((gx + dx) + ':' + (gy + dy));
      if (!bucket) continue;
      for (const m of bucket) {
        if (m === n) continue;
        let ddx = n.x - m.x, ddy = n.y - m.y;
        let d2 = ddx * ddx + ddy * ddy || 1;
        if (d2 > cell * cell * 4) continue;
        const f = (k * k) / d2 * 0.6;
        n.vx += ddx * f * 0.01; n.vy += ddy * f * 0.01;
      }
    }
  }
  // springs
  for (const e of V.edges) {
    const a = byId.get(e.source), b = byId.get(e.target);
    if (!a || !b) continue;
    const dx = b.x - a.x, dy = b.y - a.y;
    const d = Math.sqrt(dx * dx + dy * dy) || 1;
    const f = (d - 70) * 0.004;
    a.vx += dx / d * f * 10; a.vy += dy / d * f * 10;
    b.vx -= dx / d * f * 10; b.vy -= dy / d * f * 10;
  }
  // mild centering + integrate
  for (const n of nodes) {
    n.vx -= n.x * 0.0009; n.vy -= n.y * 0.0009;
    n.x += Math.max(-8, Math.min(8, n.vx)); n.y += Math.max(-8, Math.min(8, n.vy));
    n.vx *= 0.85; n.vy *= 0.85;
  }
  draw();
  requestAnimationFrame(tick);
}

// ---- rendering ----
const cv = $('cv'), ctx = cv.getContext('2d');
function resize() {
  const r = cv.getBoundingClientRect();
  cv.width = r.width * devicePixelRatio; cv.height = r.height * devicePixelRatio;
  draw();
}
window.addEventListener('resize', resize);

function fitView(R) {
  const r = cv.getBoundingClientRect();
  view.k = Math.min(r.width, r.height) / (R * 2.4) || 1;
  view.x = r.width / 2; view.y = r.height / 2;
}

function draw() {
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.translate(view.x, view.y); ctx.scale(view.k, view.k);
  const neigh = neighborSet(selected);
  ctx.lineWidth = 1 / view.k;
  for (const e of V.edges) {
    const a = byId.get(e.source), b = byId.get(e.target);
    if (!a || !b) continue;
    const hot = selected && (e.source === selected.id || e.target === selected.id);
    ctx.strokeStyle = hot ? 'rgba(94,234,212,.8)' : 'rgba(120,130,150,.16)';
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }
  for (const n of V.nodes) {
    const r = 3 + Math.min(9, Math.sqrt(n.deg));
    const dimmed = selected && n !== selected && !neigh.has(n.id);
    ctx.globalAlpha = dimmed ? 0.18 : 1;
    ctx.fillStyle = n === selected ? '#5eead4' : kindColor(n.kind);
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2); ctx.fill();
    if (view.k > 0.5 && (n === selected || neigh.has(n.id) || (!selected && n.deg > 3))) {
      ctx.fillStyle = 'rgba(215,220,229,.85)';
      ctx.font = `${11 / view.k}px ui-monospace, monospace`;
      ctx.fillText(n.label, n.x + r + 3 / view.k, n.y + 3 / view.k);
    }
    ctx.globalAlpha = 1;
  }
}

function neighborSet(sel) {
  const s = new Set();
  if (!sel) return s;
  for (const e of V.edges) {
    if (e.source === sel.id) s.add(e.target);
    if (e.target === sel.id) s.add(e.source);
  }
  return s;
}

// ---- interaction ----
let drag = null;
cv.addEventListener('mousedown', e => { drag = { x: e.clientX, y: e.clientY, moved: false }; });
window.addEventListener('mousemove', e => {
  if (!drag) return;
  view.x += e.clientX - drag.x; view.y += e.clientY - drag.y;
  drag.x = e.clientX; drag.y = e.clientY; drag.moved = true;
  draw();
});
window.addEventListener('mouseup', e => {
  if (drag && !drag.moved) pick(e);
  drag = null;
});
cv.addEventListener('wheel', e => {
  e.preventDefault();
  const r = cv.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const f = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  view.x = mx - (mx - view.x) * f; view.y = my - (my - view.y) * f; view.k *= f;
  draw();
}, { passive: false });

function pick(e) {
  const r = cv.getBoundingClientRect();
  const wx = (e.clientX - r.left - view.x) / view.k, wy = (e.clientY - r.top - view.y) / view.k;
  let best = null, bd = 12 / view.k + 6;
  for (const n of V.nodes) {
    const d = Math.hypot(n.x - wx, n.y - wy);
    if (d < bd) { bd = d; best = n; }
  }
  select(best);
}

function select(n) {
  selected = n;
  renderDetail(n);
  draw();
}

function centerOn(n) {
  const r = cv.getBoundingClientRect();
  view.k = Math.max(view.k, 1);
  view.x = r.width / 2 - n.x * view.k; view.y = r.height / 2 - n.y * view.k;
  draw();
}

function renderDetail(n) {
  const d = $('detail');
  if (!n) { d.innerHTML = '<span class="k">click a node or a hit for details</span>'; return; }
  const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const nbs = [];
  for (const e of V.edges) {
    if (e.source === n.id) nbs.push({ dir: '→', rel: e.relation, id: e.target });
    if (e.target === n.id) nbs.push({ dir: '←', rel: e.relation, id: e.source });
  }
  d.innerHTML = `<h2>${esc(n.label)}</h2>
    <div class="row"><span class="k">kind</span> ${esc(n.kind)} · <span class="k">type</span> ${esc(n.file_type)}</div>
    <div class="row"><span class="k">source</span> ${esc(n.source)} ${esc(n.location || '')}</div>
    <div class="row"><span class="k">producer</span> ${esc(n.metadata && n.metadata.producer || '')}</div>
    ${nbs.slice(0, 30).map(x => `<div class="row">${x.dir} <span class="k">${esc(x.rel)}</span> <span class="nb" data-id="${esc(x.id)}">${esc(x.id)}</span></div>`).join('')}
    ${nbs.length > 30 ? `<div class="row k">… ${nbs.length - 30} more</div>` : ''}`;
  d.querySelectorAll('.nb').forEach(el => el.addEventListener('click', () => {
    const t = byId.get(el.dataset.id);
    if (t) { select(t); centerOn(t); }
  }));
}

// ---- query ----
async function runQuery() {
  const q = $('q').value.trim();
  const res = $('results');
  if (!q) { res.innerHTML = ''; return; }
  try {
    const out = await api(`/api/query?module=${encodeURIComponent($('module').value)}&q=${encodeURIComponent(q)}`);
    const hits = out.hits || [];
    res.innerHTML = hits.length ? '' : '<div class="hit"><span class="meta">no matches</span></div>';
    for (const h of hits) {
      const div = document.createElement('div');
      div.className = 'hit';
      div.innerHTML = `<div class="label"></div><div class="meta"></div>`;
      div.querySelector('.label').textContent = `${h.node.label}  [${h.node.kind}]`;
      div.querySelector('.meta').textContent = `${h.node.source} ${h.node.location || ''} · score ${h.score}`;
      div.addEventListener('click', () => {
        document.querySelectorAll('.hit.sel').forEach(x => x.classList.remove('sel'));
        div.classList.add('sel');
        const n = byId.get(h.node.id);
        if (n) { select(n); centerOn(n); } else { renderDetail(h.node); }
      });
      res.appendChild(div);
    }
  } catch (err) {
    res.innerHTML = `<div class="hit"><span class="meta">${err.message}</span></div>`;
  }
}

$('q').addEventListener('keydown', e => { if (e.key === 'Enter') runQuery(); });
$('module').addEventListener('change', e => { $('results').innerHTML = ''; loadGraph(e.target.value); });

resize();
loadModules().catch(err => {
  $('empty').style.display = 'flex';
  $('empty').textContent = err.message;
});
</script>
</body>
</html>
