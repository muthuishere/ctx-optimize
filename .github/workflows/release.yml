# Release: tag vX.Y.Z → cross-compile via goreleaser → publish the npm
# wrapper + platform packages via OIDC trusted publishing (tokenless).
#
# One-time setup on npmjs.com (owner, web UI — no API for this):
#   for EACH package (@muthuishere/ctx-optimize and the 5 platform packages):
#   Package → Settings → Trusted Publisher → GitHub Actions →
#     repository: muthuishere/ctx-optimize, workflow: release.yml
# Until that's flipped, this workflow needs an NPM_TOKEN secret fallback.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # OIDC — this is what npm trusted publishing consumes

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with: { go-version-file: go.mod }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # OIDC trusted publishing needs npm >= 11.5 — node's bundled npm can lag
      - run: npm install -g npm@latest && npm --version
      - name: gate
        run: go vet ./... && go test ./...
      - name: build all platforms
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          args: build --clean
      - name: sync versions to tag
        run: |
          V="${GITHUB_REF_NAME#v}"
          for d in npm npm/platforms/*; do
            (cd "$d" && npm version "$V" --no-git-tag-version --allow-same-version)
          done
          # wrapper's optionalDependencies must pin the same version
          node -e '
            const f="npm/package.json", p=require("./"+f), v=process.env.GITHUB_REF_NAME.slice(1);
            for (const k of Object.keys(p.optionalDependencies)) p.optionalDependencies[k]=v;
            require("fs").writeFileSync(f, JSON.stringify(p,null,2)+"\n");'
      - name: copy README (npm "files" is resolved relative to each package dir)
        run: cp README.md npm/README.md
      - name: publish platform packages
        run: |
          for d in npm/platforms/*; do
            (cd "$d" && npm publish --access public)
          done
      - name: publish wrapper
        run: cd npm && npm publish --access public
