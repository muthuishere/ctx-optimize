version: '3'

# Local builds stamp the same version vars goreleaser injects in CI, derived
# from git — otherwise every local binary reports "0.0.0-dev (none, unknown)"
# and you can't tell which build you're actually running.
vars:
  PKG: github.com/muthuishere/ctx-optimize/internal/version
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo 0.0.0-dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: >-
    -X {{.PKG}}.Version={{.VERSION}}
    -X {{.PKG}}.Commit={{.COMMIT}}
    -X {{.PKG}}.Date={{.DATE}}

tasks:
  build:
    desc: Build the CLI (version stamped from git)
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o bin/ctx-optimize ./cmd/ctx-optimize

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  lint:
    desc: go vet the module
    cmds:
      - go vet ./...

  ci:
    desc: The gate — same as CI runs
    cmds:
      - task: lint
      - task: test
      - task: build
      - ./bin/ctx-optimize version
      - ./bin/ctx-optimize help

  # Dashboard UI targets are DEV-ONLY (need node). The built bundle is
  # COMMITTED at internal/dashboard/ui/ (treesitter.wasm precedent), so
  # `task ci` and `go install` never touch npm.
  dashboard-dev:
    desc: Vite dev server for dashboard-ui (proxies /api to a running `ctx-optimize serve` on :4747)
    dir: dashboard-ui
    cmds:
      - npm install
      - npm run dev

  dashboard-build:
    desc: Build dashboard-ui and copy dist/ into internal/dashboard/ui (the go:embed dir — commit the result)
    dir: dashboard-ui
    cmds:
      - npm ci
      - npm run build
      - rm -rf ../internal/dashboard/ui
      - mkdir -p ../internal/dashboard/ui
      - cp -R dist/. ../internal/dashboard/ui/

  dashboard-test:
    desc: Vitest unit tests for the dashboard UI (pure logic — sanitize/decode). Not in `task ci` (that gate stays node-free).
    dir: dashboard-ui
    cmds:
      - npm ci
      - npm test

  snapshot:
    desc: goreleaser snapshot build (no publish)
    cmds:
      - goreleaser release --snapshot --clean --skip=publish

  local-install:
    desc: Symlink bin/ctx-optimize onto PATH (a symlink, so `task build` keeps it current — a copy goes stale and silently reports an old version)
    deps: [build]
    vars:
      BINDIR: '{{.BINDIR | default (printf "%s/.local/bin" .HOME)}}'
    cmds:
      - mkdir -p "{{.BINDIR}}"
      - ln -sf "$(pwd)/bin/ctx-optimize" "{{.BINDIR}}/ctx-optimize"
      - '"{{.BINDIR}}/ctx-optimize" version'

  install-skills:
    desc: Install the agent skill via the built binary
    deps: [build]
    cmds:
      - ./bin/ctx-optimize install --skills
